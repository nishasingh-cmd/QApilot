name: QAPilot CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Lint & Build Frontend ────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true  # Lint warnings should not block deployments

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ─── Job 2: Backend Checks ───────────────────────────────────────────────────
  backend:
    name: Backend — Dependency & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check server package.json exists
        run: |
          if [ -f "server/package.json" ]; then
            cd server && npm install
          else
            echo "No server/package.json — using root deps"
          fi

      - name: Verify server entry point exists
        run: |
          if [ ! -f "server/index.js" ]; then
            echo "ERROR: server/index.js not found!" && exit 1
          fi
          echo "✅ server/index.js found"

      - name: Verify critical server files
        run: |
          required_files=(
            "server/config/db.js"
            "server/config/redis.js"
            "server/middleware/authMiddleware.js"
            "server/middleware/errorHandler.js"
            "server/utils/logger.js"
          )
          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ Missing: $f" && exit 1
            fi
          done

  # ─── Job 3: Docker Build Check (on main only) ────────────────────────────────
  docker-check:
    name: Docker — Build Validation
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client Docker image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: qapilot-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build server Docker image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: false
          tags: qapilot-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
