version: "3.9"

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: qapilot_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: qapilot
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - qapilot_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qapilot_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - qapilot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Express API ────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: qapilot_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/qapilot
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qapilot_net

  # ─── React Client (dev mode via vite) ───────────────────────────────────────
  client:
    image: node:20-alpine
    container_name: qapilot_client
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - qapilot_net

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  qapilot_net:
    driver: bridge
